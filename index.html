<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>鄭州東站：神州通語 (文字版)</title>
    <style>
        body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; background: #cfd8dc; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #game-box { width: 900px; height: 600px; background: #fff; border-radius: 8px; box-shadow: 0 15px 50px rgba(0,0,0,0.3); display: flex; flex-direction: column; border: 4px solid #003399; }
        
        /* 頂部標題 */
        .header { background: #003399; color: white; padding: 20px; font-size: 1.4rem; font-weight: bold; letter-spacing: 2px; text-align: center; }

        /* 中間對話區 */
        #display-area { flex: 1; padding: 40px; background: #f9f9f9; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* 旅客對話氣泡 */
        .bubble { 
            background: #fff; border: 3px solid #333; padding: 30px; border-radius: 15px; 
            width: 80%; min-height: 100px; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #d32f2f; text-align: center; cursor: pointer; transition: 0.3s;
            box-shadow: 8px 8px 0 #ddd;
        }
        .bubble:hover { transform: translateY(-5px); box-shadow: 12px 12px 0 #ccc; border-color: #003399; }
        
        .hint-text { margin-top: 20px; color: #78909c; font-size: 1rem; font-style: italic; }

        /* 下方按鈕區 */
        .action-bar { background: #eeeeee; padding: 30px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .reply-btn { 
            padding: 20px; font-size: 1.3rem; border: 2px solid #003399; background: #fff; color: #003399;
            cursor: pointer; font-weight: bold; transition: 0.2s; border-radius: 5px;
        }
        .reply-btn:hover:not(:disabled) { background: #003399; color: #fff; }
        .reply-btn:disabled { border-color: #bbb; color: #bbb; cursor: not-allowed; }

        /* 成功/失敗覆蓋層 */
        #feedback { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .feedback-title { font-size: 3rem; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="game-box">
    <div class="header">🚉 鄭州東站：心語服務台 (漢語方言筆談挑戰)</div>
    
    <div id="display-area">
        <div id="feedback">
            <div class="feedback-title" id="fb-text">正確</div>
            <button class="reply-btn" onclick="nextLevel()">接待下一位旅客</button>
        </div>

        <div class="bubble" id="chat-bubble" onclick="revealHanzi()">
            <span id="pinyin-display">載入中...</span>
        </div>
        <div class="hint-text" id="status-hint">旅客正在說話，你聽的一頭霧水... (點擊對話氣泡請求「筆談」)</div>
    </div>

    <div class="action-bar">
        <button class="reply-btn action-opt" onclick="handleReply('廁所')" disabled>請直走左轉，那裡有洗手間</button>
        <button class="reply-btn action-opt" onclick="handleReply('買票')" disabled>自動售票機在您身後</button>
        <button class="reply-btn action-opt" onclick="handleReply('報警')" disabled>請稍等，我立刻聯繫站內警務室</button>
    </div>
</div>

<script>
    // 【這裡修改例句】
    const quizPool = [
        { 
            pinyin: "Chhiáng-mng phiò chi̍t-tiunn lōa-choe chîⁿ?", 
            hanzi: "請問票一張偌濟錢？", 
            answer: "買票",
            dialect: "閩南語 (Hokkien)"
        },
        { 
            pinyin: "Ngo5 soeng2 hai2 ni1 dou6 maai5 piu3.", 
            hanzi: "我想喺呢度買飛。", 
            answer: "買票",
            dialect: "粵語 (Cantonese)"
        },
        { 
            pinyin: "Ci-ka u-sa-diu-ve va?", 
            hanzi: "洗手間勒啥地方？", 
            answer: "廁所",
            dialect: "吳語 (Shanghainese)"
        },
        { 
            pinyin: "O-yau po-ging, ngo-ge bao bei-yan tau-jo!", 
            hanzi: "我要報警，我個包俾人偷咗！", 
            answer: "報警",
            dialect: "粵語 (Cantonese)"
        }
    ];

    let currentIdx = 0;
    let isRevealed = false;

    function initLevel() {
        if (currentIdx >= quizPool.length) {
            document.getElementById('display-area').innerHTML = "<h1>您完美解決了所有旅客的問題！<br>充分展現了「書同文」的跨地域溝通能力。</h1>";
            return;
        }

        isRevealed = false;
        const data = quizPool[currentIdx];
        
        // 顯示拼音
        document.getElementById('pinyin-display').innerText = data.pinyin;
        document.getElementById('pinyin-display').style.color = "#d32f2f";
        document.getElementById('status-hint').innerText = `一名來自遠方的旅客發出了聲音... (點擊氣泡請求「筆談」)`;
        
        // 隱藏反饋層
        document.getElementById('feedback').style.display = 'none';
        
        // 禁用按鈕
        toggleBtns(true);
    }

    function revealHanzi() {
        if (isRevealed) return;
        isRevealed = true;
        
        const data = quizPool[currentIdx];
        // 轉化為漢字
        document.getElementById('pinyin-display').innerText = data.hanzi;
        document.getElementById('pinyin-display').style.color = "#003399";
        document.getElementById('status-hint').innerText = `透過筆談，文字揭示了意圖！ (這是：${data.dialect})`;
        
        // 啟用按鈕
        toggleBtns(false);
    }

    function handleReply(type) {
        const correctType = quizPool[currentIdx].answer;
        const fb = document.getElementById('feedback');
        const fbText = document.getElementById('fb-text');
        
        fb.style.display = 'flex';
        
        if (type === correctType) {
            fbText.innerText = "√ 回答正確";
            fbText.style.color = "#2e7d32";
        } else {
            fbText.innerText = "× 旅客一臉困惑";
            fbText.style.color = "#c62828";
        }
    }

    function nextLevel() {
        currentIdx++;
        initLevel();
    }

    function toggleBtns(disabled) {
        const btns = document.querySelectorAll('.action-opt');
        btns.forEach(b => b.disabled = disabled);
    }

    // 啟動遊戲
    initLevel();
</script>

</body>
</html>
