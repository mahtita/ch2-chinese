<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>高鐵鄭州東站：神州通語</title>
    <style>
        body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; background: #b0bec5; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* 說明與獎勵層 */
        #overlay, #win-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 1000; display: flex; 
            justify-content: center; align-items: center; text-align: center; color: white; 
        }
        .info-box { background: #fff; color: #333; padding: 40px; border-radius: 20px; border: 5px solid #003399; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* 遊戲主容器 */
        #game-container { position: relative; width: 1000px; height: 650px; background: #fff; border: 8px solid #003399; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { background: #003399; color: white; padding: 20px; font-size: 1.6rem; text-align: center; font-weight: bold; }

        #display-area { flex: 1; padding: 40px; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* 旅客對話氣泡 */
        .bubble { 
            background: #fff; border: 4px solid #333; padding: 35px; border-radius: 20px; 
            width: 85%; min-height: 120px; display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; color: #d32f2f; text-align: center; cursor: pointer; transition: 0.3s;
            box-shadow: 10px 10px 0 #cfd8dc;
        }
        .bubble:hover { transform: scale(1.02); border-color: #003399; }
        
        .hint-text { margin-top: 25px; color: #546e7a; font-size: 1.2rem; font-weight: bold; }

        /* 動態操作區 */
        .action-area { height: 160px; background: #eceff1; padding: 25px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; border-top: 3px solid #003399; }
        .reply-btn { 
            padding: 10px; font-size: 1.3rem; border: 3px solid #003399; background: #fff; color: #003399;
            cursor: pointer; font-weight: bold; transition: 0.2s; border-radius: 10px;
        }
        .reply-btn:hover:not(:disabled) { background: #003399; color: #fff; }
        .reply-btn:disabled { border-color: #bbb; color: #bbb; cursor: not-allowed; }

        .btn-start { padding: 15px 40px; font-size: 1.5rem; background: #003399; color: white; border: none; border-radius: 50px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="info-box">
        <h1 style="color:#003399">🚄 高鐵鄭州東站 🚄</h1>
        <p>現在你是鄭州東站的服務人員！</p>
        <p>來自全國各地的旅客會用<strong>方言拼音</strong>向你諮詢，你會聽得一頭霧水。</p>
        <p><strong>請點擊氣泡進行「筆談」</strong>，利用漢字跨越溝通障礙並給出正確引導！</p>
        <button class="btn-start" onclick="startGame()">開始服務旅客</button>
    </div>
</div>

<div id="win-screen" style="display:none;">
    <div class="info-box">
        <h1 style="color:#2e7d32">🏆 溝通大師！</h1>
        <p>你成功服務了所有旅客。</p>
        <p style="font-size: 1.1rem; line-height: 1.6;">即使方言「南腔北調」如外語般難懂，但<strong>書同文</strong>，便萬里無礙。</p>
        <div style="font-size: 5rem; margin: 20px;">🚄📜</div>
        <button class="btn-start" onclick="location.reload()">重新值班</button>
    </div>
</div>

<div id="game-container">
    <div class="header">🚄 高鐵鄭州東站 🚄</div>
    
    <div id="display-area">
        <div class="bubble" id="chat-bubble" onclick="revealHanzi()">
            <span id="pinyin-display">準備中...</span>
        </div>
        <div class="hint-text" id="status-hint">旅客已抵達服務台...</div>
    </div>

    <div class="action-area" id="btn-group">
        </div>
</div>

<script>
    // 【在這裡存放你的數據】
    const quizPool = [
        { 
            pinyin: "Da-su-ke le' la' ha li ta'", 
            hanzi: "汏(洗)手間勒何里𡍲？", 
            dialect: "吳語 (上海)",
            options: [
                { text: "請直走左轉，那裡有洗手間", isCorrect: true },
                { text: "請右轉直走到底，那裡有地鐵站", isCorrect: false },
                { text: "遺失物領取請去二樓", isCorrect: false }
            ]
        },
        { 
            pinyin: "Ngo5 soeng2 hai2 ni1 dou6 maai5 piu3", 
            hanzi: "我想喺呢度買飛(票)。", 
            dialect: "粵語 (廣州)",
            options: [
                { text: "請由東正門出去轉，那裏有巴士站", isCorrect: false },
                { text: "本櫃台不售票，請去機器購票", isCorrect: true },
                { text: "地鐵換乘請右轉，再直走到底", isCorrect: false }
            ]
        },
        { 
            pinyin: "автобус җан зэли", 
            hanzi: "巴士(Avtobus)站(在)哪裡？", 
            dialect: "東干語 (中亞/吉爾吉斯)",
            options: [
                { text: "巴士請由東正門出去轉", isCorrect: true },
                { text: "去月台請搭乘一號電梯", isCorrect: false },
                { text: "洗手間在售票廳斜後方", isCorrect: false }
            ]
        },
        { 
            pinyin: "Chhiáng-mng phiò chi̍t-tiunn lōa-choe chîⁿ", 
            hanzi: "請問票一張偌濟錢？", 
            dialect: "閩南語 (廈門)",
            options: [
                { text: "計程車請往西廣場走", isCorrect: false },
                { text: "抱歉，這裡不賣地鐵票", isCorrect: false },
                { text: "一張票是 150 元", isCorrect: true }
            ]
        },
        { 
            pinyin: "vzi dai pɔ nang tʰau au", 
            hanzi: "鈔票袋畀人偷哩！", 
            dialect: "溫州語 (溫州)",
            options: [
                { text: "行李寄放的密碼一定要熟記", isCorrect: false },
                { text: "抱歉這裡沒有飲水機", isCorrect: false },
                { text: "這裡馬上連絡公安", isCorrect: true }
            ]
        },
        { 
            pinyin: "Ngo iau mai qi Fung-sang go piau", 
            hanzi: "我要買去豐城的票", 
            dialect: "贛語 (豐城)",
            options: [
                { text: "豐山東站的票，要去售票機購買", isCorrect: false },
                { text: "豐城東站的票，要去售票機購買", isCorrect: true },
                { text: "豐昌東站的票，要去售票機購買", isCorrect: false }
            ]
        }
    ];

    let currentIdx = 0;
    let isRevealed = false;

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        initLevel();
    }

    function initLevel() {
        if (currentIdx >= quizPool.length) {
            document.getElementById('win-screen').style.display = 'flex';
            return;
        }

        isRevealed = false;
        const data = quizPool[currentIdx];
        
        document.getElementById('pinyin-display').innerText = data.pinyin;
        document.getElementById('pinyin-display').style.color = "#d32f2f";
        document.getElementById('status-hint').innerText = "🔊 旅客諮詢中... (聽不懂，請點擊氣泡進行筆談)";
        
        // 動態生成該題專屬選項
        const btnGroup = document.getElementById('btn-group');
        btnGroup.innerHTML = '';
        
        // 選項隨機打亂
        const shuffledOptions = [...data.options].sort(() => Math.random() - 0.5);
        
        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'reply-btn';
            btn.innerText = opt.text;
            btn.disabled = false; // 筆談前不能選
            btn.onclick = () => checkAnswer(opt.isCorrect);
            btnGroup.appendChild(btn);
        });
    }

    function revealHanzi() {
        if (isRevealed) return;
        isRevealed = true;
        
        const data = quizPool[currentIdx];
        document.getElementById('pinyin-display').innerText = data.hanzi;
        document.getElementById('pinyin-display').style.color = "#003399";
        document.getElementById('status-hint').innerText = `【筆談：${data.dialect}】現在你看懂旅客的意思了！`;
        
        // 啟用所有按鈕
        const btns = document.querySelectorAll('.reply-btn');
    }

    function checkAnswer(isCorrect) {
        if (isCorrect) {
            currentIdx++;
            alert("回答正確！旅客滿意地離開了。");
            initLevel();
        } else {
            alert("答錯了！旅客露出了困惑的表情，請再看一次筆談內容。");
        }
    }
</script>

</body>
</html>
